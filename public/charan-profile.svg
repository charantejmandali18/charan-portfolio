<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f766e"/>
      <stop offset="100%" stop-color="#1a1f3d"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.2" fill="#fcd6c2" opacity="0.25"/>
    </pattern>
  </defs>
  <rect width="400" height="500" fill="url(#bg)"/>
  <rect width="400" height="500" fill="url(#dots)"/>
  <g opacity="0.9">
    <circle cx="200" cy="200" r="60" fill="none" stroke="#fcd6c2" stroke-width="3" stroke-dasharray="6 4"/>
    <text x="200" y="208" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#fcd6c2" font-style="italic">photo here</text>
  </g>
</svg>
